<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBS 수능특강 Light 영어독해연습 - 문장 순서 배열 연습</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(45deg, #6f42c1, #e83e8c);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .exercise-container { padding: 30px 20px; }
        .exercise-info {
            background: #f8f9fa;
            border-left: 5px solid #6f42c1;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }
        .exercise-select { margin-bottom: 30px; text-align: center; }
        .exercise-select select {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            min-width: 300px;
            max-width: 100%;
        }
        .controls { text-align: center; margin: 20px 0; }
        .btn {
            background: linear-gradient(45deg, #6f42c1, #e83e8c);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(111, 66, 193, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(111, 66, 193, 0.4); }
        .btn:disabled { background: #6c757d; cursor: not-allowed; transform: none; box-shadow: none; }
        .exercise-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .back-btn { left: 15px; padding: 8px 15px; font-size: 14px; }
            .header { padding: 25px 15px; }
            .header h1 { font-size: 1.8em; }
            .header p { font-size: 1em; }
            .exercise-container { padding: 20px 15px; }
            .exercise-select select { min-width: 250px; font-size: 14px; padding: 10px 15px; }
            .btn { padding: 10px 20px; font-size: 14px; margin: 5px; }
            .sentence-item { padding: 12px; font-size: 14px; }
            .drop-zone { padding: 15px; min-height: 60px; font-size: 14px; }
            .exercise-area { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .back-btn { left: 10px; padding: 6px 12px; font-size: 12px; }
            .header { padding: 20px 10px; }
            .header h1 { font-size: 1.6em; }
            .exercise-container { padding: 15px 10px; }
            .exercise-select select { min-width: 200px; font-size: 13px; }
            .btn { padding: 8px 15px; font-size: 13px; }
            .sentence-item { padding: 10px; font-size: 13px; }
        }
        .scrambled-sentences, .ordered-sentences {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 400px;
        }
        .scrambled-sentences h3, .ordered-sentences h3 {
            color: #6f42c1;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #6f42c1;
            padding-bottom: 5px;
        }
        .sentence-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            line-height: 1.5;
            font-family: 'Times New Roman', serif;
        }
        .sentence-item:hover {
            border-color: #6f42c1;
            box-shadow: 0 4px 12px rgba(111, 66, 193, 0.2);
            transform: translateY(-2px);
        }
        .sentence-item:active { transform: scale(0.98); }
        .sentence-item.selected {
            border-color: #007bff;
            background-color: rgba(0, 123, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.3);
        }
        .drop-zone {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 5px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.3s ease;
            font-style: italic;
            cursor: pointer;
        }
        .drop-zone:hover {
            border-color: #6f42c1;
            background-color: rgba(111, 66, 193, 0.1);
            color: #6f42c1;
        }
        .drop-zone.highlight {
            border-color: #007bff;
            background-color: rgba(0, 123, 255, 0.1);
            color: #007bff;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }
        .score-display {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .feedback {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .feedback.correct { background: linear-gradient(45deg, #28a745, #20c997); color: white; opacity: 1; }
        .feedback.incorrect { background: linear-gradient(45deg, #dc3545, #fd7e14); color: white; opacity: 1; }
        .correct-sentence { border-color: #28a745 !important; background-color: rgba(40, 167, 69, 0.1); }
        .incorrect-sentence { border-color: #dc3545 !important; background-color: rgba(220, 53, 69, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="main.html" class="back-btn">← 과 선택</a>
            <h1>📚 EBS 수능특강 Light 영어독해연습</h1>
            <p>3강 &amp; 5강 - 영어 문장들을 올바른 순서로 배열해보세요!</p>
        </div>

        <div class="exercise-container">
            <div class="exercise-info">
                <h3>📚 연습 방법</h3>
                <p>1. 아래에서 연습할 지문을 선택하세요<br>
                2. 왼쪽의 문장을 클릭해서 선택한 후, 오른쪽의 원하는 위치를 클릭하세요<br>
                3. 잘못 배치한 문장은 클릭해서 다시 왼쪽으로 돌려보낼 수 있습니다<br>
                4. '정답 확인' 버튼을 눌러 결과를 확인하세요</p>
            </div>

            <div class="exercise-select">
                <select id="exerciseSelect">
                    <option value="">연습할 지문을 선택하세요</option>
                    <option value="ch03_ex01">3강 - Exercise 01 (6문장)</option>
                    <option value="ch03_ex02">3강 - Exercise 02 (6문장)</option>
                    <option value="ch03_ex03">3강 - Exercise 03 (8문장)</option>
                    <option value="ch03_ex04">3강 - Exercise 04 (7문장)</option>
                    <option value="ch03_ex05">3강 - Exercise 05 (7문장)</option>
                    <option value="ch03_ex06">3강 - Exercise 06 (5문장)</option>
                    <option value="ch05_ex01">5강 - Exercise 01 (8문장)</option>
                    <option value="ch05_ex02">5강 - Exercise 02 (5문장)</option>
                    <option value="ch05_ex03">5강 - Exercise 03 (5문장)</option>
                    <option value="ch05_ex04">5강 - Exercise 04 (10문장)</option>
                    <option value="ch05_ex05">5강 - Exercise 05 (8문장)</option>
                </select>
            </div>

            <div class="controls">
                <button class="btn" id="shuffleBtn" disabled>다시 섞기</button>
                <button class="btn" id="checkBtn" disabled>정답 확인</button>
                <button class="btn" id="resetBtn" disabled>초기화</button>
            </div>

            <div class="score-display" id="scoreDisplay" style="display: none;">
                점수: <span id="score">0</span>/100
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="exercise-area" id="exerciseArea" style="display: none;">
                <div class="scrambled-sentences">
                    <h3>🔀 Scrambled Sentences</h3>
                    <div id="scrambledContainer"></div>
                </div>
                <div class="ordered-sentences">
                    <h3>✅ Correct Order</h3>
                    <div id="orderedContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const exercises = {
            ch03_ex01: [
                "The million-dollar question where courage is concerned is whether or not courage can be learned.",
                "If fear and courage are to be found at least in part in the hard-wiring of our brains, then it certainly makes sense to assume that there is a genetic component to bravery.",

                "Fortunately, the research suggests there is hope for people who want to boost their courage quotient.",
                "Studies show that people ─ as many as 82 percent of those studied ─ overwhelmingly opt to try courage-enhancing strategies to help them face difficult circumstances.",
                "Actors who are nervous before opening night spend time on the stage, familiarizing themselves with the auditorium; boxers strut and look angry to overcome the butterflies in their stomachs; people pray or knock on wood or wear favorite pieces of clothing, all because they think this will help to give them a more favorable outcome and allow them to face an uncertain, even risky future."
            ],
            ch03_ex02: [
                "Patients with damage to the back of the brain, where the visual cortex lies, often have visual memory problems and do not benefit from visual imagery when trying to memorize words.",
                "This suggests that the visual brain regions (temporo-occipital cortex) are necessary for forming visual images.",
                "A study of brain-damaged patients has revealed separate verbal and nonverbal systems in the brain.",
                "Some patients whose visual brain areas are intact but who have suffered damage to the brain's language areas have no problems identifying an object by sight but have great difficulty identifying the same object from its name alone.",
                "Such patients still have access to their nonverbal (visual imagery) system, but have problems accessing the verbal identity system.",
                "In most people these two systems do not work independently, but are continually interacting to enable skills such as object recognition and imagery-based memory."
            ],
            ch03_ex03: [
                "Various factors are behind the cognitive bias towards coherence.",
                "One is the extrapolation of past experience that influences our perceptions through expectations about what we are going to perceive.",
                "A case in point here is the well-known playing-card experiment involving impossible cards.",
                "A subject is briefly shown a variety of playing cards, some of which are doctored (such as a black king of hearts) and is asked to identify them.",
                "In the majority of cases, the subjects did not note the unusual features of the doctored cards, but rather perceived them as regular cards.",
                "The black king of hearts would thus be identified as a king of spades ─ not because the subject cannot differentiate heart-shapes from spade-shapes, but because he sees what he is expecting to see, namely a regular playing card.",
                "Our expectations about what we are going to perceive can strongly influence what we do in fact perceive.",
                "In this way, having perceived various coherent phenomena in the past, we can expect that future perceived phenomena are similarly coherent, and this expectation may make it more likely that we in fact experience them as coherent, whether they are coherent or not."
            ],
            ch03_ex04: [
                "Reciprocal altruism is when we help others we are not related to.",
                "At first, reciprocal altruism seems more difficult to understand as there is no obvious genetic benefit.",
                "One strange example of reciprocal altruism comes from the blood-sucking vampire bat of South America.",
                "If, after a night's hunting, a particular bat has been unsuccessful, other bats will regurgitate some of the blood they have swallowed to feed their hungry nestmate ─ but only if they can be trusted to return the favour.",
                "Bats who have broken such blood deals in the past gain a reputation for being selfish and are ignored in the future, should they go hungry.",
                "Given the unpredictability of meals, reciprocal altruism is a strategy to get individuals through lean times.",
                "If you have a particularly good day hunting, then sharing with others less successful creates a debt to be paid back when you are not so fortunate."
            ],
            ch03_ex05: [
                "It is common for managers to make decisions while paying attention to what accountants call the \"bottom line\" ─ that is, considering how the decision will affect the profitability of the firm.",
                "But more and more today, we talk about the triple bottom line ─ a concept that focuses on a firm's economic, social, and environmental performance.",
                "Some call this triple bottom line the concern for the \"3 P's\" ─ profit, people, and planet.",
                "You might think of it more generally as acting with a sense of corporate social responsibility.",
                "And, by the way, that's most likely how you'd like your future employers to behave.",
                "\"Students nowadays want to work for companies that help enhance the quality of life in their surrounding community,\" says one observer.",
                "And in one survey, 70% of students report that \"a company's reputation and ethics\" was \"very important\" when deciding whether or not to accept a job offer; in another survey, 79% of 13-25 year olds say they \"want to work for a company that cares about how it affects or contributes to society.\""
            ],
            ch03_ex06: [
                "For those who perceive progress (in some manner or form) within evolution, an optimistic view of the future is not merely wishful thinking; the evidence seems to indicate widespread long-term progress in the past (perhaps the biggest trend in history).",
                "In predicting or anticipating the future, our major source of information and point of departure is the past; it is from the past and the patterns of change observed that we learn to anticipate the future.",
                "Kurzweil, a futurist, for one, clearly believes that based on his quantitative assessment of the historical exponential growth of information processing, he can reliably predict at least certain aspects of the future, which include increasing intelligence and information processing, in the shape of things to come.",
                "The progressive vision of evolution is the cognitive foundation and motivational inspiration behind \"evolutionary optimism,\" which diametrically opposes the ancient view that time is a fall from perfection; to reverse metaphors, time becomes a progression from the most primitive and primordial.",
                "As Desmond Morris, a zoologist, has noted, although we may prefer to think of ourselves as \"fallen angels,\" in reality, we are \"risen apes.\""
            ],
            ch05_ex01: [
                "In the complex tapestry of life, challenges and problems are inevitable; suffering due to them is, however, optional.",
                "It is crucial to grasp the wisdom in John Milton's Paradise Lost, where Satan observes, \"The mind is its own place, and in itself can make a Heaven of Hell, a Hell of Heaven.\"",
                "My father used to often quote William Shakespeare's insight in Hamlet: \"There is nothing either good or bad, but thinking makes it so.\"",
                "These timeless quotes underscore the transformative power of our perception.",
                "Problems become opportunities for growth when viewed through a positive lens.",
                "By aligning our thoughts with this perspective, we not only navigate challenges with resilience but also unlock our creative potential, evolving into empowered individuals both personally and professionally.",
                "By adopting this approach, you will not only progress towards your goals, but also attain a level of world-class excellence.",
                "Stay committed to the journey, solve the puzzles that come your way, and watch as your purpose unfolds into a meaningful, impactful life."
            ],
            ch05_ex02: [
                "In couple's work, practicing mindfulness includes helping each partner to become more aware of the words they are using with each other and choosing better ones that, rather than push the partner away, restore closeness.",
                "They learn to watch their own body language, being mindful of what they're projecting to their partner through how they're sitting or standing, the tone of their voice, the volume at which they're speaking, and the expressions on their face.",
                "It's being aware of the predictable unhealthy patterns that they continue to repeat in their arguments, and replacing them with the paths that actually lead to resolution.",
                "It's taking the time to self-soothe, calming themselves back down when they're getting upset, and also knowing how to soothe their partner when it's the partner's upset that is escalating too far.",
                "So, mindfulness is not just self-awareness but also other-awareness."
            ],
            ch05_ex03: [
                "A hunter/forager's relationship to animals differs from that of a domesticator.",
                "For the forager, there can be a deep mutual interaction with other species, with humans shaping much of their activity to those of the animals and the other species responding to the pressures emanating from human predation.",
                "For example, across millennia human groups in northern parts of the world structured their lives around the migrations of herds of caribou or reindeer or buffalo, who in turn shaped their ranging and feeding behaviors based on human predation.",
                "But with domestication, relationships move beyond predator-prey interactions to a much more direct and intensive mutual reshaping of bodies and lifeways.",
                "The investment in one another and the processes of relationships become more integrated and interreliant."
            ],
            ch05_ex04: [
                "Most habitually four-footed creatures have a centre of mass in the chest region.",
                "It takes a lot of energy for them to lever themselves upwards onto their hindlimbs.",
                "This makes it hard for them to stand comfortably upright for any length of time.",
                "In dinosaurs, by contrast, the centre of mass was over the hips.",
                "A relatively short body forward of the hips was counterbalanced by a long, stiff tail behind.",
                "With the hips as a fulcrum, dinosaurs could stand on their hindlimbs without effort.",
                "Rather than the short, thick limbs of most amniotes, dinosaurs could grow their hindlimbs long and thin.",
                "Legs are easier to move if they are more slender towards the ends.",
                "The easier the legs are to move, the easier it is to run fast.",
                "The arms, no longer required for running, were reduced, the hands left free for other activities, such as grasping prey items or climbing."
            ],
            ch05_ex05: [
                "The number of architects who either leave or redefine what they do is surprisingly high.",
                "In the UK, data from the Royal Institute of British Architects (RIBA) show more than half of the students who have completed the undergraduate bachelor of architecture degree, known as Part I, do not go on to complete the post-graduate Part III, a requirement for registration as an architect, representing a gap of around 1,600 students per year, with some claiming the ratio of those who become registered architects versus those who take up the degree is as low as one in 14.",
                "In the US, the gap between graduates and those registered is narrower, with 37 percent not ultimately registering as an architect, or about 2,500 per year.",
                "This is perhaps due to the far greater total cost of a US education, at an average of $190,000 for a four-year professional degree.",
                "It's unclear where these students go or what they end up doing, as their pathways are not captured in the research.",
                "Anecdotally, we know that many graduates of architecture continue to work in architectural practice while never registering as architects.",
                "Many will go elsewhere.",
                "We are hesitant to place too much emphasis on the statistics, as few professional bodies or schools have set out to specifically capture the professional destination of those who have left."
            ]
        };

        let currentExercise = [];
        let correctOrder = [];
        let userOrder = [];
        let selectedSentence = null;

        const exerciseSelect = document.getElementById('exerciseSelect');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const exerciseArea = document.getElementById('exerciseArea');
        const scrambledContainer = document.getElementById('scrambledContainer');
        const orderedContainer = document.getElementById('orderedContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreElement = document.getElementById('score');
        const feedback = document.getElementById('feedback');

        exerciseSelect.addEventListener('change', function() {
            const selectedExercise = this.value;
            if (selectedExercise) loadExercise(selectedExercise);
        });

        shuffleBtn.addEventListener('click', shuffleSentences);
        checkBtn.addEventListener('click', checkAnswer);
        resetBtn.addEventListener('click', resetExercise);

        function loadExercise(exerciseKey) {
            currentExercise = [...exercises[exerciseKey]];
            correctOrder = [...currentExercise];
            userOrder = [];
            selectedSentence = null;
            shuffleSentences();
            exerciseArea.style.display = 'block';
            shuffleBtn.disabled = false;
            resetBtn.disabled = false;
            scoreDisplay.style.display = 'none';
            hideFeedback();
        }

        function shuffleSentences() {
            const shuffled = [...currentExercise];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            displayScrambledSentences(shuffled);
            createDropZones();
            checkBtn.disabled = true;
            userOrder = [];
            selectedSentence = null;
        }

        function displayScrambledSentences(sentences) {
            scrambledContainer.innerHTML = '';
            sentences.forEach(sentence => {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.className = 'sentence-item';
                sentenceDiv.textContent = sentence;
                sentenceDiv.dataset.sentence = sentence;
                sentenceDiv.addEventListener('click', function() { selectSentence(this); });
                scrambledContainer.appendChild(sentenceDiv);
            });
        }

        function selectSentence(element) {
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            element.classList.add('selected');
            selectedSentence = element;
            document.querySelectorAll('.drop-zone').forEach(zone => zone.classList.add('highlight'));
            showFeedback('선택된 문장을 배치할 위치를 클릭하세요!', 'correct');
        }

        function createDropZones() {
            orderedContainer.innerHTML = '';
            for (let i = 0; i < currentExercise.length; i++) {
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone';
                dropZone.textContent = `문장 ${i + 1}을 여기에 배치하세요`;
                dropZone.dataset.position = i;
                dropZone.addEventListener('click', function() { handleDropZoneClick(this); });
                orderedContainer.appendChild(dropZone);
            }
        }

        function handleDropZoneClick(dropZone) {
            if (!selectedSentence) {
                showFeedback('먼저 왼쪽에서 문장을 선택하세요!', 'incorrect');
                return;
            }
            const sentence = selectedSentence.dataset.sentence;
            const position = parseInt(dropZone.dataset.position);
            const sentenceDiv = document.createElement('div');
            sentenceDiv.className = 'sentence-item';
            sentenceDiv.textContent = sentence;
            sentenceDiv.dataset.sentence = sentence;
            sentenceDiv.dataset.position = position;
            sentenceDiv.addEventListener('click', function() { returnSentence(this); });
            dropZone.parentNode.replaceChild(sentenceDiv, dropZone);
            selectedSentence.remove();
            selectedSentence = null;
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            updateUserOrder();
            hideFeedback();
        }

        function returnSentence(sentenceElement) {
            const position = parseInt(sentenceElement.dataset.position);
            const sentence = sentenceElement.dataset.sentence;
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.textContent = `문장 ${position + 1}을 여기에 배치하세요`;
            dropZone.dataset.position = position;
            dropZone.addEventListener('click', function() { handleDropZoneClick(this); });
            sentenceElement.parentNode.replaceChild(dropZone, sentenceElement);
            const newSentenceDiv = document.createElement('div');
            newSentenceDiv.className = 'sentence-item';
            newSentenceDiv.textContent = sentence;
            newSentenceDiv.dataset.sentence = sentence;
            newSentenceDiv.addEventListener('click', function() { selectSentence(this); });
            scrambledContainer.appendChild(newSentenceDiv);
            updateUserOrder();
        }

        function updateUserOrder() {
            const placedItems = orderedContainer.querySelectorAll('.sentence-item');
            userOrder = Array.from(placedItems).map(item => item.dataset.sentence);
            const allPlaced = orderedContainer.querySelectorAll('.drop-zone').length === 0;
            checkBtn.disabled = !allPlaced;
        }

        function checkAnswer() {
            const placedItems = orderedContainer.querySelectorAll('.sentence-item');
            let correctCount = 0;
            placedItems.forEach((item, index) => {
                item.classList.remove('correct-sentence', 'incorrect-sentence');
                if (item.dataset.sentence === correctOrder[index]) {
                    item.classList.add('correct-sentence');
                    correctCount++;
                } else {
                    item.classList.add('incorrect-sentence');
                }
            });
            const score = Math.round((correctCount / correctOrder.length) * 100);
            scoreElement.textContent = score;
            scoreDisplay.style.display = 'block';
            if (score === 100) {
                showFeedback('🎉 완벽합니다! 모든 문장의 순서가 맞습니다!', 'correct');
            } else if (score >= 60) {
                showFeedback(`👍 좋아요! ${correctCount}/${correctOrder.length}개가 맞았습니다. 계속 연습해보세요!`, 'correct');
            } else {
                showFeedback(`💪 ${correctCount}/${correctOrder.length}개가 맞았습니다. 다시 도전해보세요!`, 'incorrect');
            }
        }

        function resetExercise() {
            userOrder = [];
            selectedSentence = null;
            shuffleSentences();
            scoreDisplay.style.display = 'none';
            hideFeedback();
        }

        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
        }

        function hideFeedback() {
            feedback.className = 'feedback';
            feedback.textContent = '';
        }
    </script>
</body>
</html>
