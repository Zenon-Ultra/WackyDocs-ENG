<!DOCTYPE html>
<html lang="ko"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1과: A Better Life for Everybody - 문장 순서 배열 연습</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            background: linear-gradient(135deg, #1a6b3c 0%, #2d9c5f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .back-btn {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .header {
            background: linear-gradient(45deg, #1a6b3c, #2d9c5f);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .exercise-container {
            padding: 30px 20px;
        }

        .exercise-select select {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            min-width: 300px;
            max-width: 100%;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .back-btn { left: 15px; padding: 8px 15px; font-size: 14px; }
            .header { padding: 25px 15px; }
            .header h1 { font-size: 1.8em; }
            .header p { font-size: 1em; }
            .exercise-container { padding: 20px 15px; }
            .exercise-select select { min-width: 250px; font-size: 14px; padding: 10px 15px; }
            .btn { padding: 10px 20px; font-size: 14px; margin: 5px; }
            .sentence-item { padding: 12px; font-size: 14px; }
            .drop-zone { padding: 15px; min-height: 60px; font-size: 14px; }
        }

        @media (max-width: 480px) {
            .back-btn { left: 10px; padding: 6px 12px; font-size: 12px; }
            .header { padding: 20px 10px; }
            .header h1 { font-size: 1.6em; }
            .exercise-container { padding: 15px 10px; }
            .exercise-select select { min-width: 200px; font-size: 13px; }
            .btn { padding: 8px 15px; font-size: 13px; }
            .sentence-item { padding: 10px; font-size: 13px; }
        }

        .header h1 { font-size: 2.2em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1em; opacity: 0.9; }

        .exercise-info {
            background: #f8f9fa;
            border-left: 5px solid #1a6b3c;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .exercise-select { margin-bottom: 30px; text-align: center; }

        .controls { text-align: center; margin: 20px 0; }

        .btn {
            background: linear-gradient(45deg, #1a6b3c, #2d9c5f);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 107, 60, 0.3);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 107, 60, 0.4); }
        .btn:disabled { background: #6c757d; cursor: not-allowed; transform: none; box-shadow: none; }

        .exercise-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .exercise-area { grid-template-columns: 1fr; }
        }

        .scrambled-sentences, .ordered-sentences {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 400px;
        }

        .scrambled-sentences h3, .ordered-sentences h3 {
            color: #1a6b3c;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #1a6b3c;
            padding-bottom: 5px;
        }

        .sentence-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            line-height: 1.5;
            font-family: 'Times New Roman', serif;
        }

        .sentence-item:hover { border-color: #1a6b3c; box-shadow: 0 4px 12px rgba(26, 107, 60, 0.2); transform: translateY(-2px); }
        .sentence-item:active { transform: scale(0.98); }
        .sentence-item.selected { border-color: #007bff; background-color: rgba(0, 123, 255, 0.1); box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); }

        .drop-zone {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 5px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.3s ease;
            font-style: italic;
            cursor: pointer;
        }

        .drop-zone:hover { border-color: #1a6b3c; background-color: rgba(26, 107, 60, 0.1); color: #1a6b3c; }
        .drop-zone.highlight { border-color: #007bff; background-color: rgba(0, 123, 255, 0.1); color: #007bff; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }

        .score-display {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .feedback {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feedback.correct { background: linear-gradient(45deg, #28a745, #20c997); color: white; opacity: 1; }
        .feedback.incorrect { background: linear-gradient(45deg, #dc3545, #fd7e14); color: white; opacity: 1; }

        .correct-sentence { border-color: #28a745 !important; background-color: rgba(40, 167, 69, 0.1); }
        .incorrect-sentence { border-color: #dc3545 !important; background-color: rgba(220, 53, 69, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="main.html" class="back-btn">← 과 선택</a>
            <h1>♿ 1과: A Better Life for Everybody</h1>
            <p>Universal Design for Everyone - 영어 문장들을 올바른 순서로 배열해보세요!</p>
        </div>

        <div class="exercise-container">
            <div class="exercise-info">
                <h3>📚 연습 방법</h3>
                <p>1. 아래에서 연습할 문단을 선택하세요<br>
                2. 왼쪽의 문장을 클릭해서 선택한 후, 오른쪽의 원하는 위치를 클릭하세요<br>
                3. 잘못 배치한 문장은 클릭해서 다시 왼쪽으로 돌려보낼 수 있습니다<br>
                4. '정답 확인' 버튼을 눌러 결과를 확인하세요</p>
            </div>

            <div class="exercise-select">
                <select id="exerciseSelect">
                    <option value="">연습할 문단을 선택하세요</option>
                    <option value="paragraph1">Paragraph 1: The Problem with Majority Design (다수를 위한 설계의 문제) - 5문장</option>
                    <option value="paragraph2">Paragraph 2: Ronald Mace and Universal Design (로널드 메이스와 유니버설 디자인) - 5문장</option>
                    <option value="paragraph3">Paragraph 3: Principles of Universal Design (유니버설 디자인의 원칙) - 4문장</option>
                    <option value="paragraph4">Paragraph 4: Universal Design in Architecture (건축에서의 유니버설 디자인) - 6문장</option>
                    <option value="paragraph5">Paragraph 5: Universal Design in Transportation (교통수단에서의 유니버설 디자인) - 7문장</option>
                    <option value="paragraph6">Paragraph 6: Universal Design in Fashion (패션에서의 유니버설 디자인) - 6문장</option>
                    <option value="paragraph7">Paragraph 7: A Call for More Universal Design (더 많은 유니버설 디자인을 위한 촉구) - 4문장</option>
                </select>
            </div>

            <div class="controls">
                <button class="btn" id="shuffleBtn" disabled="">다시 섞기</button>
                <button class="btn" id="checkBtn" disabled="">정답 확인</button>
                <button class="btn" id="resetBtn" disabled="">초기화</button>
            </div>

            <div class="score-display" id="scoreDisplay" style="display: none;">
                점수: <span id="score">0</span>/100
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="exercise-area" id="exerciseArea" style="display: none;">
                <div class="scrambled-sentences">
                    <h3>🔀 Scrambled Sentences</h3>
                    <div id="scrambledContainer"></div>
                </div>
                <div class="ordered-sentences">
                    <h3>✅ Correct Order</h3>
                    <div id="orderedContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
       const exercises = {
            paragraph1: [
                "Did you know that one out of every ten people in the world is left-handed?",
                "They face challenges in a society designed for right-handed individuals.",
                "It is inconvenient for them to use some right-handed products such as scissors, cameras, and computer mice.",
                "The world we live in is designed to be an environment suitable for what is considered \"normal\" for the majority of people, and it is filled with objects that are easy for them to use.",
                "Thus, those who do not belong to that category have no choice but to live with discomfort.",
                "In other words, a minority of people with physical differences, such as the left-handed, the disabled, and the elderly, either endure inconvenience or deliberately seek objects designed especially for them, which are often difficult to find."
            ],
            paragraph2: [
                "Is it impossible to build an environment where everyone can use products and facilities conveniently and without limitations?",
                "It was Ronald Mace who sought the answer to this question.",
                "He contracted polio at the age of nine and spent the rest of his life in a wheelchair.",
                "When studying architecture at university, he struggled to access some campus facilities due to inaccessible building designs.",
                "This experience later inspired him to invent the term universal design, which refers to design for all."
            ],
            paragraph3: [
                "As an architect and product designer, he pursued a world in which all products and environments were designed to be artistic and usable to the greatest extent possible by everyone, regardless of their age, size, disability, nationality, or language.",
                "According to the principles of universal design, the design must be able to be used equitably, flexibly, simply, and intuitively by a wide variety of people.",
                "In addition, it should be cognitively accessible and minimize users’ physical efforts.",
                "Finally, it requires the providing of sufficient space for all users while reducing potential hazards and adverse consequences from accidental or unintended actions.",
                "A key feature of universal design is that this is not a special requirement only for the benefit of a minority of the population.",
                "If an environment is accessible, usable, convenient, and a pleasure to use, everyone in the community benefits."
            ],
            paragraph4: [
                "How has universal design been incorporated into modern architecture?",
                "One of the most representative examples of universal design being used to improve accessibility is the ramps installed in front of buildings.",
                "Ramps, not stairs, are necessary for people with disabilities who use wheelchairs, and they are also beneficial for parents pushing strollers and the elderly.",
                "Another example is automatic doors.",
                "They are invaluable for those who rely on assistive devices such as wheelchairs and crutches.",
                "They also provide convenience for adults who have their hands full and children who are not tall enough to open the doors themselves.",
                "A further example is tactile paving.",
                "These textured surfaces, often found on sidewalks, steps, and crosswalks, assist visually impaired individuals by guiding them through urban spaces."
            ],
            paragraph5: [
                "Universal design is not only applied in modern architecture but also extends to transportation systems.",
                "For instance, buses have been designed with a floor closer to ground level to ease access for all passengers.",
                "Handles of various lengths are provided, another method by which universal design is implemented to accommodate passengers’ different heights.",
                "Subway maps have also been designed for color-blind individuals to clearly distinguish between subway lines by adjusting the color and the brightness and by varying the thickness of lines that have similar colors.",
                "Additionally, the use of pictograms can be seen frequently.",
                "Signs indicating the locations of subway or train stations assist international travelers who may not be familiar with the local language.",
                "Likewise, road signs indicating school zones, speed limits, and directions for turns and stops aid drivers in recognizing important information more easily."
            ],
            paragraph6: [
                "While universal design has been utilized in architecture and transportation systems for some time, a newer application is in the fashion industry.",
                "Clothing designed with universal design integrates stretchable and breathable materials, enhancing comfort and mobility.",
                "Other features include the use of magnets and Velcro in place of buttons, making it easier to put on and take off clothing.",
                "It also incorporates traits like stretchy waistbands and adjustable sleeves to allow individuals with disabilities to dress independently.",
                "This type of clothing is also beneficial for pregnant women, older adults who may experience mobility issues, and individuals with temporary injuries or medical conditions.",
                "Overall, universal design clothing promotes increased comfort, convenience, independence, and improved mobility and flexibility for wearers of all abilities."
            ],
            paragraph7: [
                "You may find it surprising that universal design can be found in more parts of society than you thought.",
                "However, enough has not been done to accommodate everyone yet.",
                "Universal design should be implemented more extensively to promote full participation in the community for a wider range of people.",
                "It is time to build more equitable environments that are accessible to everyone.",
                "So are you on board to create a universally designed world for all?"
            ]
        };

        let currentExercise = [];
        let correctOrder = [];
        let userOrder = [];
        let selectedSentence = null;

        const exerciseSelect = document.getElementById('exerciseSelect');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const exerciseArea = document.getElementById('exerciseArea');
        const scrambledContainer = document.getElementById('scrambledContainer');
        const orderedContainer = document.getElementById('orderedContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreElement = document.getElementById('score');
        const feedback = document.getElementById('feedback');

        exerciseSelect.addEventListener('change', function() {
            const selectedExercise = this.value;
            if (selectedExercise) loadExercise(selectedExercise);
        });

        shuffleBtn.addEventListener('click', shuffleSentences);
        checkBtn.addEventListener('click', checkAnswer);
        resetBtn.addEventListener('click', resetExercise);

        function loadExercise(exerciseKey) {
            currentExercise = [...exercises[exerciseKey]];
            correctOrder = [...currentExercise];
            userOrder = [];
            selectedSentence = null;
            shuffleSentences();
            exerciseArea.style.display = 'block';
            shuffleBtn.disabled = false;
            resetBtn.disabled = false;
            scoreDisplay.style.display = 'none';
            hideFeedback();
        }

        function shuffleSentences() {
            const shuffled = [...currentExercise];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            displayScrambledSentences(shuffled);
            createDropZones();
            checkBtn.disabled = true;
            userOrder = [];
            selectedSentence = null;
        }

        function displayScrambledSentences(sentences) {
            scrambledContainer.innerHTML = '';
            sentences.forEach(sentence => {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.className = 'sentence-item';
                sentenceDiv.textContent = sentence;
                sentenceDiv.dataset.sentence = sentence;
                sentenceDiv.addEventListener('click', function() { selectSentence(this); });
                scrambledContainer.appendChild(sentenceDiv);
            });
        }

        function selectSentence(element) {
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            element.classList.add('selected');
            selectedSentence = element;
            document.querySelectorAll('.drop-zone').forEach(zone => zone.classList.add('highlight'));
            showFeedback('선택된 문장을 배치할 위치를 클릭하세요!', 'correct');
        }

        function createDropZones() {
            orderedContainer.innerHTML = '';
            for (let i = 0; i < currentExercise.length; i++) {
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone';
                dropZone.textContent = `문장 ${i + 1}을 여기에 배치하세요`;
                dropZone.dataset.position = i;
                dropZone.addEventListener('click', function() { handleDropZoneClick(this); });
                orderedContainer.appendChild(dropZone);
            }
        }

        function handleDropZoneClick(dropZone) {
            if (!selectedSentence) {
                showFeedback('먼저 왼쪽에서 문장을 선택하세요!', 'incorrect');
                return;
            }
            const sentence = selectedSentence.dataset.sentence;
            const position = parseInt(dropZone.dataset.position);
            const sentenceDiv = document.createElement('div');
            sentenceDiv.className = 'sentence-item';
            sentenceDiv.textContent = sentence;
            sentenceDiv.dataset.sentence = sentence;
            sentenceDiv.dataset.position = position;
            sentenceDiv.addEventListener('click', function() { returnSentence(this); });
            dropZone.parentNode.replaceChild(sentenceDiv, dropZone);
            selectedSentence.remove();
            selectedSentence = null;
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            updateUserOrder();
            hideFeedback();
        }

        function returnSentence(sentenceElement) {
            const position = parseInt(sentenceElement.dataset.position);
            const sentence = sentenceElement.dataset.sentence;
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.textContent = `문장 ${position + 1}을 여기에 배치하세요`;
            dropZone.dataset.position = position;
            dropZone.addEventListener('click', function() { handleDropZoneClick(this); });
            sentenceElement.parentNode.replaceChild(dropZone, sentenceElement);
            const newSentenceDiv = document.createElement('div');
            newSentenceDiv.className = 'sentence-item';
            newSentenceDiv.textContent = sentence;
            newSentenceDiv.dataset.sentence = sentence;
            newSentenceDiv.addEventListener('click', function() { selectSentence(this); });
            scrambledContainer.appendChild(newSentenceDiv);
            selectedSentence = null;
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            updateUserOrder();
        }

        function updateUserOrder() {
            userOrder = [];
            const placedSentences = orderedContainer.querySelectorAll('.sentence-item');
            placedSentences.forEach(sentence => {
                const position = parseInt(sentence.dataset.position);
                userOrder[position] = sentence.dataset.sentence;
            });
            const hasEmptySlots = userOrder.includes(undefined) || userOrder.length !== currentExercise.length;
            checkBtn.disabled = hasEmptySlots;
        }

        function checkAnswer() {
            let correct = 0;
            const placedSentences = orderedContainer.querySelectorAll('.sentence-item');
            placedSentences.forEach(sentence => {
                sentence.classList.remove('correct-sentence', 'incorrect-sentence');
                const position = parseInt(sentence.dataset.position);
                if (sentence.dataset.sentence === correctOrder[position]) {
                    sentence.classList.add('correct-sentence');
                    correct++;
                } else {
                    sentence.classList.add('incorrect-sentence');
                }
            });
            const score = Math.round((correct / currentExercise.length) * 100);
            scoreElement.textContent = score;
            scoreDisplay.style.display = 'block';
            if (score === 100) {
                showFeedback('🎉 완벽합니다! 모든 문장을 올바르게 배열했습니다!', 'correct');
            } else if (score >= 70) {
                showFeedback(`👍 잘했습니다! ${correct}/${currentExercise.length}개 정답입니다.`, 'correct');
            } else {
                showFeedback(`💪 다시 한번 시도해보세요! ${correct}/${currentExercise.length}개 정답입니다.`, 'incorrect');
            }
        }

        function resetExercise() {
            const selectedExercise = exerciseSelect.value;
            if (selectedExercise) loadExercise(selectedExercise);
            hideFeedback();
        }

        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
        }

        function hideFeedback() {
            feedback.className = 'feedback';
        }
    </script>


</body></html>
