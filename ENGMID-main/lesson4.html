<!DOCTYPE html>
<html lang="ko"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4: Cultural Treasures - King Jeongjo's Grand Procession - 문장 순서 배열 연습</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            background: linear-gradient(135deg, #8b4513 0%, #d4843d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .back-btn {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .header {
            background: linear-gradient(45deg, #8b4513, #d4843d);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .exercise-container {
            padding: 30px 20px;
        }

        .exercise-select select {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            min-width: 300px;
            max-width: 100%;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .back-btn { left: 15px; padding: 8px 15px; font-size: 14px; }
            .header { padding: 25px 15px; }
            .header h1 { font-size: 1.8em; }
            .header p { font-size: 1em; }
            .exercise-container { padding: 20px 15px; }
            .exercise-select select { min-width: 250px; font-size: 14px; padding: 10px 15px; }
            .btn { padding: 10px 20px; font-size: 14px; margin: 5px; }
            .sentence-item { padding: 12px; font-size: 14px; }
            .drop-zone { padding: 15px; min-height: 60px; font-size: 14px; }
        }

        @media (max-width: 480px) {
            .back-btn { left: 10px; padding: 6px 12px; font-size: 12px; }
            .header { padding: 20px 10px; }
            .header h1 { font-size: 1.6em; }
            .exercise-container { padding: 15px 10px; }
            .exercise-select select { min-width: 200px; font-size: 13px; }
            .btn { padding: 8px 15px; font-size: 13px; }
            .sentence-item { padding: 10px; font-size: 13px; }
        }

        .header h1 { font-size: 2.2em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1em; opacity: 0.9; }

        .exercise-info {
            background: #f8f9fa;
            border-left: 5px solid #8b4513;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .exercise-select { margin-bottom: 30px; text-align: center; }

        .controls { text-align: center; margin: 20px 0; }

        .btn {
            background: linear-gradient(45deg, #8b4513, #d4843d);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4); }
        .btn:disabled { background: #6c757d; cursor: not-allowed; transform: none; box-shadow: none; }

        .exercise-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .exercise-area { grid-template-columns: 1fr; }
        }

        .scrambled-sentences, .ordered-sentences {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 400px;
        }

        .scrambled-sentences h3, .ordered-sentences h3 {
            color: #8b4513;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 5px;
        }

        .sentence-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            line-height: 1.5;
            font-family: 'Times New Roman', serif;
        }

        .sentence-item:hover { border-color: #8b4513; box-shadow: 0 4px 12px rgba(139, 69, 19, 0.2); transform: translateY(-2px); }
        .sentence-item:active { transform: scale(0.98); }
        .sentence-item.selected { border-color: #007bff; background-color: rgba(0, 123, 255, 0.1); box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); }

        .drop-zone {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 5px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.3s ease;
            font-style: italic;
            cursor: pointer;
        }

        .drop-zone:hover { border-color: #8b4513; background-color: rgba(139, 69, 19, 0.1); color: #8b4513; }
        .drop-zone.highlight { border-color: #007bff; background-color: rgba(0, 123, 255, 0.1); color: #007bff; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }

        .score-display {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .feedback {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feedback.correct { background: linear-gradient(45deg, #28a745, #20c997); color: white; opacity: 1; }
        .feedback.incorrect { background: linear-gradient(45deg, #dc3545, #fd7e14); color: white; opacity: 1; }

        .correct-sentence { border-color: #28a745 !important; background-color: rgba(40, 167, 69, 0.1); }
        .incorrect-sentence { border-color: #dc3545 !important; background-color: rgba(220, 53, 69, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="main.html" class="back-btn">← 과 선택</a>
            <h1>Lesson 4: Cultural Treasures</h1>
            <p>King Jeongjo's Grand Procession - 영어 문장들을 올바른 순서로 배열해보세요!</p>
        </div>

        <div class="exercise-container">
            <div class="exercise-info">
                <h3>📚 연습 방법</h3>
                <p>1. 아래에서 연습할 문단을 선택하세요<br>
                2. 왼쪽의 문장을 클릭해서 선택한 후, 오른쪽의 원하는 위치를 클릭하세요<br>
                3. 잘못 배치한 문장은 클릭해서 다시 왼쪽으로 돌려보낼 수 있습니다<br>
                4. '정답 확인' 버튼을 눌러 결과를 확인하세요</p>
            </div>

            <div class="exercise-select">
                <select id="exerciseSelect">
                    <option value="">연습할 문단을 선택하세요</option>
                    <option value="paragraph1">Paragraph 1: Introduction to the 1795 Procession - 3문장</option>
                    <option value="paragraph2">Paragraph 2: The Grand Scale of the Event - 3문장</option>
                    <option value="paragraph3">Paragraph 3: Duration and Distance - 1문장</option>
                    <option value="paragraph4">Paragraph 4: Personal Reasons for the Procession - 4문장</option>
                    <option value="paragraph5">Paragraph 5: Political Statement & Strength - 3문장</option>
                    <option value="paragraph6">Paragraph 6: Hwaseong Fortress Plans - 3문장</option>
                    <option value="paragraph7">Paragraph 7: Fair Treatment of Workers - 4문장</option>
                    <option value="paragraph8">Paragraph 8: Accessible Government - 3문장</option>
                    <option value="paragraph9">Paragraph 9: Documentation & Government Exams - 3문장</option>
                    <option value="paragraph10">Paragraph 10: UNESCO Recognition Process - 2문장</option>
                    <option value="paragraph11">Paragraph 11: Legacy & Cultural Heritage - 2문장</option>
                </select>
            </div>

            <div class="controls">
                <button class="btn" id="shuffleBtn" disabled="">다시 섞기</button>
                <button class="btn" id="checkBtn" disabled="">정답 확인</button>
                <button class="btn" id="resetBtn" disabled="">초기화</button>
            </div>

            <div class="score-display" id="scoreDisplay" style="display: none;">
                점수: <span id="score">0</span>/100
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="exercise-area" id="exerciseArea" style="display: none;">
                <div class="scrambled-sentences">
                    <h3>🔀 Scrambled Sentences</h3>
                    <div id="scrambledContainer"></div>
                </div>
                <div class="ordered-sentences">
                    <h3>✅ Correct Order</h3>
                    <div id="orderedContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
       const exercises = {
            paragraph1: [
                "Hey there! Let me introduce you to a fascinating piece of Korean history.",
                "Back on February 9, 1795, something remarkable happened in front of Changdeokgung Palace, where King Jeongjo lived.",
                "There was quite a crowd gathered there to witness a very special procession that's still talked about in Korea today."
            ],
            paragraph2: [
                "Now, imagine this: more than 2,000 soldiers, hundreds of horse riders, and lots of important officials, all marching alongside the king and his mother with 50 musicians playing traditional instruments.",
                "When they crossed a bridge made of 36 boats on the Hangang River, you can imagine how that turned heads!",
                "That must have been something ordinary people rarely saw. Talk about a big event!"
            ],
            paragraph3: [
                "This was not just about putting on a show. No, it was serious business. Lasting four days and covering 68 kilometers, the procession moved alongside the king and his mother as they made a round trip to Hwaseong Haenggung."
            ],
            paragraph4: [
                "Why did all of this happen?",
                "The first thing King Jeongjo had in mind was to show respect to his family. It happened around his mother's sixtieth birthday.",
                "Back in the Joseon Dynasty, just like today, turning 60 years old had a special meaning. And his father's tomb was near Hwaseong Haenggung.",
                "He was planning to hold a memorial service to honor his late father. By combining the two events, he was telling everyone how much family meant to him."
            ],
            paragraph5: [
                "But wait. There's more.",
                "King Jeongjo was also making a statement about the Joseon Dynasty's strength. He dressed up like a military leader, wearing armor and sitting on a horse with his soldiers marching in perfect order.",
                "It was a way of saying, 'We're ready to protect our land.' He was really serious about making the Joseon Dynasty a powerful and successful kingdom."
            ],
            paragraph6: [
                "Now, here's the twist: the procession also had something to do with Hwaseong Fortress, which was being built.",
                "In King Jeongjo's mind were big plans for Hwaseong. He wanted it to be a self-sufficient city with a strong military, farming, and trade as he hoped to make it the new capital, away from all the political chaos in Hanyang.",
                "So King Jeongjo gathered the best talents, such as Jeong Yakyong, and let them bring together the finest architectural techniques of his time from both the East and the West to build Hwaseong Fortress."
            ],
            paragraph7: [
                "There's more to King Jeongjo's story.",
                "He treated his people well during the construction of the fortress. They received fair wages and breaks during bad weather and were even paid when they were sick, something that was unheard of at that time.",
                "Back then, ordinary people were typically required to work on public projects without getting paid. Once people got wind of King Jeongjo's plan, workers from all over the country came together in a rush.",
                "So, in under three years was the project finished, though it was initially thought to take about 10 years. Impressive, right?"
            ],
            paragraph8: [
                "Let's go back to the procession.",
                "The procession wasn't just some fancy show for ordinary people. It was actually a way for them to get up close and personal with the king.",
                "King Jeongjo set up a chance during the procession for common people to meet him and to share their concerns. This was a big deal, especially for those who couldn't read or write."
            ],
            paragraph9: [
                "And here's the cherry on top: through the procession, King Jeongjo made government more accessible.",
                "During that time, the government used to hold exams to hire officials every three years. So, there weren't many chances available.",
                "He added special exams during the procession, giving more people a shot at joining the government. This move was innovative back then and made the government more diverse."
            ],
            paragraph10: [
                "And guess what? King Jeongjo didn't forget a single detail.",
                "He made sure everything was documented properly by creating records for the procession and the construction of Hwaseong Fortress. These construction records were especially a lifesaver when the fortress was damaged during wartime."
            ],
            paragraph11: [
                "At first, the people at UNESCO were a bit unsure about recognizing Hwaseong Fortress as the real deal.",
                "They weren't totally convinced it was authentic. But after checking out translated documents and comparing them with the restored fortress, they finally came around and agreed that the fortress had actually been restored just the way it was meant to be."
            ]
        };

        let currentExercise = [];
        let correctOrder = [];
        let userOrder = [];
        let selectedSentence = null;

        const exerciseSelect = document.getElementById('exerciseSelect');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const exerciseArea = document.getElementById('exerciseArea');
        const scrambledContainer = document.getElementById('scrambledContainer');
        const orderedContainer = document.getElementById('orderedContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreElement = document.getElementById('score');
        const feedback = document.getElementById('feedback');

        exerciseSelect.addEventListener('change', function() {
            const selectedExercise = this.value;
            if (selectedExercise) loadExercise(selectedExercise);
        });

        shuffleBtn.addEventListener('click', shuffleSentences);
        checkBtn.addEventListener('click', checkAnswer);
        resetBtn.addEventListener('click', resetExercise);

        function loadExercise(exerciseKey) {
            currentExercise = [...exercises[exerciseKey]];
            correctOrder = [...currentExercise];
            userOrder = [];
            selectedSentence = null;
            shuffleSentences();
            exerciseArea.style.display = 'block';
            shuffleBtn.disabled = false;
            resetBtn.disabled = false;
            scoreDisplay.style.display = 'none';
            hideFeedback();
        }

        function shuffleSentences() {
            const shuffled = [...currentExercise];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            displayScrambledSentences(shuffled);
            createDropZones();
            checkBtn.disabled = true;
            userOrder = [];
            selectedSentence = null;
        }

        function displayScrambledSentences(sentences) {
            scrambledContainer.innerHTML = '';
            sentences.forEach(sentence => {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.className = 'sentence-item';
                sentenceDiv.textContent = sentence;
                sentenceDiv.dataset.sentence = sentence;
                sentenceDiv.addEventListener('click', function() { selectSentence(this); });
                scrambledContainer.appendChild(sentenceDiv);
            });
        }

        function selectSentence(element) {
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            element.classList.add('selected');
            selectedSentence = element;
            document.querySelectorAll('.drop-zone').forEach(zone => zone.classList.add('highlight'));
            showFeedback('선택된 문장을 배치할 위치를 클릭하세요!', 'correct');
        }

        function createDropZones() {
            orderedContainer.innerHTML = '';
            for (let i = 0; i < currentExercise.length; i++) {
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone';
                dropZone.textContent = `문장 ${i + 1}을 여기에 배치하세요`;
                dropZone.dataset.position = i;
                dropZone.addEventListener('click', function() { handleDropZoneClick(this); });
                orderedContainer.appendChild(dropZone);
            }
        }

        function handleDropZoneClick(dropZone) {
            if (!selectedSentence) {
                showFeedback('먼저 왼쪽에서 문장을 선택하세요!', 'incorrect');
                return;
            }
            const sentence = selectedSentence.dataset.sentence;
            const position = parseInt(dropZone.dataset.position);
            const sentenceDiv = document.createElement('div');
            sentenceDiv.className = 'sentence-item';
            sentenceDiv.textContent = sentence;
            sentenceDiv.dataset.sentence = sentence;
            sentenceDiv.dataset.position = position;
            sentenceDiv.addEventListener('click', function() { returnSentence(this); });
            dropZone.parentNode.replaceChild(sentenceDiv, dropZone);
            selectedSentence.remove();
            selectedSentence = null;
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            updateUserOrder();
            hideFeedback();
        }

        function returnSentence(sentenceElement) {
            const position = parseInt(sentenceElement.dataset.position);
            const sentence = sentenceElement.dataset.sentence;
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.textContent = `문장 ${position + 1}을 여기에 배치하세요`;
            dropZone.dataset.position = position;
            dropZone.addEventListener('click', function() { handleDropZoneClick(this); });
            sentenceElement.parentNode.replaceChild(dropZone, sentenceElement);
            const newSentenceDiv = document.createElement('div');
            newSentenceDiv.className = 'sentence-item';
            newSentenceDiv.textContent = sentence;
            newSentenceDiv.dataset.sentence = sentence;
            newSentenceDiv.addEventListener('click', function() { selectSentence(this); });
            scrambledContainer.appendChild(newSentenceDiv);
            selectedSentence = null;
            document.querySelectorAll('.sentence-item.selected').forEach(item => item.classList.remove('selected'));
            document.querySelectorAll('.drop-zone.highlight').forEach(zone => zone.classList.remove('highlight'));
            updateUserOrder();
        }

        function updateUserOrder() {
            userOrder = [];
            const placedSentences = orderedContainer.querySelectorAll('.sentence-item');
            placedSentences.forEach(sentence => {
                const position = parseInt(sentence.dataset.position);
                userOrder[position] = sentence.dataset.sentence;
            });
            const hasEmptySlots = userOrder.includes(undefined) || userOrder.length !== currentExercise.length;
            checkBtn.disabled = hasEmptySlots;
        }

        function checkAnswer() {
            let correct = 0;
            const placedSentences = orderedContainer.querySelectorAll('.sentence-item');
            placedSentences.forEach(sentence => {
                sentence.classList.remove('correct-sentence', 'incorrect-sentence');
                const position = parseInt(sentence.dataset.position);
                if (sentence.dataset.sentence === correctOrder[position]) {
                    sentence.classList.add('correct-sentence');
                    correct++;
                } else {
                    sentence.classList.add('incorrect-sentence');
                }
            });
            const score = Math.round((correct / currentExercise.length) * 100);
            scoreElement.textContent = score;
            scoreDisplay.style.display = 'block';
            if (score === 100) {
                showFeedback('🎉 완벽합니다! 모든 문장을 올바르게 배열했습니다!', 'correct');
            } else if (score >= 70) {
                showFeedback(`👍 잘했습니다! ${correct}/${currentExercise.length}개 정답입니다.`, 'correct');
            } else {
                showFeedback(`💪 다시 한번 시도해보세요! ${correct}/${currentExercise.length}개 정답입니다.`, 'incorrect');
            }
        }

        function resetExercise() {
            const selectedExercise = exerciseSelect.value;
            if (selectedExercise) loadExercise(selectedExercise);
            hideFeedback();
        }

        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
        }

        function hideFeedback() {
            feedback.className = 'feedback';
        }
    </script>


</body></html>
