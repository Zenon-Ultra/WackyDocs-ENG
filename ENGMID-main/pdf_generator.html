<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영단어 플래시카드 마스터</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-front-bg: #ffffff;
            --card-back-bg: #e0e7ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button, select {
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            outline: none;
        }

        button:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }

        button.primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        button.primary:hover {
            background-color: var(--primary-hover);
        }

        /* Flashcard Container */
        .card-container {
            width: 100%;
            max-width: 450px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .card-front {
            background-color: var(--card-front-bg);
        }

        .card-back {
            background-color: var(--card-back-bg);
            transform: rotateY(180deg);
            color: #312e81;
        }

        .card-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            position: absolute;
            top: 1.2rem;
        }

        .card-word {
            font-size: 1.8rem;
            font-weight: 700;
            word-break: keep-all;
        }

        /* Nav Controls */
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .progress-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 80px;
            text-align: center;
        }

        /* Progress Bar */
        .progress-bar-container {
            width: 100%;
            max-width: 450px;
            height: 6px;
            background-color: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Shortcuts Info */
        .shortcuts {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .card-container {
                height: 240px;
            }
            .card-word {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Vocabulary Flashcards</h1>
        <p>단어장을 플래시카드로 완벽하게 암기해보세요.</p>
    </header>

    <div class="controls">
        <select id="modeSelect">
            <option value="eng-kor">영어 ➔ 한국어</option>
            <option value="kor-eng">한국어 ➔ 영어</option>
        </select>
        <button id="shuffleBtn">🔀 셔플 (섞기)</button>
        <button id="resetBtn">🔄 처음부터</button>
    </div>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="card-type" id="frontType">Question</div>
                <div class="card-word" id="frontText">Word</div>
            </div>
            <div class="card-face card-back">
                <div class="card-type" id="backType">Answer</div>
                <div class="card-word" id="backText">Meaning</div>
            </div>
        </div>
    </div>

    <div class="nav-controls">
        <button id="prevBtn">◀ 이전</button>
        <span class="progress-text" id="progressText">0 / 0</span>
        <button id="nextBtn">다음 ▶</button>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="shortcuts">
        💡 <b>단축키 안내</b><br>
        [스페이스바] : 카드 뒤집기 | [← 왼쪽 방향키] : 이전 카드 | [→ 오른쪽 방향키] : 다음 카드
    </div>

    <script>
        // PDF 데이터 전처리 및 수정본 반영
        const rawVocabulary = [
            { eng: "advances", kor: "진보하다" },
            { eng: "Stuff", kor: "물건" },
            { eng: "Operations", kor: "작업들" },
            { eng: "over", kor: "걸쳐서" },
            { eng: "Take", kor: "살펴보면 (명령형)" },
            { eng: "buggy whips", kor: "마차 채찍 (구식 물건)" },
            { eng: "presenting", kor: "제시함으로써" },
            { eng: "typewriters", kor: "타자기" },
            { eng: "assumption", kor: "가정" },
            { eng: "infrastructure", kor: "기반시설" },
            { eng: "recipient", kor: "수령자 (또는 수형자)" },
            { eng: "prophet", kor: "예언자" },
            { eng: "Substantial", kor: "상당한" },
            { eng: "made much of", kor: "많이 중시되다" },
            { eng: "instructive", kor: "교훈적인" },
            { eng: "metropolitan", kor: "대도시" },
            { eng: "pocketbook", kor: "금전적인 / 지갑" },
            { eng: "Implications", kor: "영향 / 함의" },
            { eng: "Strain", kor: "부담" },
            { eng: "the sidewalk vending", kor: "보행로 판매" },
            { eng: "elasticity", kor: "탄력성" },
            { eng: "Intermediate", kor: "중간재" },
            { eng: "variation", kor: "변동" },
            { eng: "Retail", kor: "소매" },
            { eng: "significantly", kor: "크게 / 현저히" },
            { eng: "square foot", kor: "평방피트 (평당피트)" },
            { eng: "modify", kor: "바꾸다 / 수정하다" },
            { eng: "Aside from", kor: "~을 제외하고" },
            { eng: "Substitutes", kor: "대체품" },
            { eng: "Vendor", kor: "노점상" },
            { eng: "forerunners", kor: "선구자들" },
            { eng: "Substitute", kor: "대신으로 쓰다" },
            { eng: "deep pocket", kor: "자금력이 풍부한" },
            { eng: "Couple of decades", kor: "이십 년 동안" },
            { eng: "millionaire", kor: "백만장자" },
            { eng: "Credible", kor: "신뢰할만한" },
            { eng: "price range", kor: "가격대" },
            { eng: "arousal", kor: "각성" },
            { eng: "none whatsoever", kor: "전혀 없음 (not at all 보다 강한 표현)" },
            { eng: "disgust", kor: "혐오" },
            { eng: "Chasing", kor: "겨냥하는 / 추격하는" },
            { eng: "blunted", kor: "무뎌지다" },
            { eng: "Underappreciated", kor: "과소평가되는" },
            { eng: "desensitization", kor: "탈감각" },
            { eng: "square", kor: "광장" },
            { eng: "interfere", kor: "방해하다" },
            { eng: "future-proof", 	kor: "미래를 견뎌 내는 (지속 가능한)" },
            { eng: "association", kor: "연관성" },
            { eng: "medieval", kor: "중세" },
            { eng: "authentic", kor: "진정한" },
            { eng: "Commitment", kor: "헌신의 결과 / 약속" },
            { eng: "window-dressing", kor: "겉치레 / 분식회계" },
            { eng: "further", kor: "부추기다 / 촉진하다" },
            { eng: "disrupting", kor: "붕괴시키는 / 방해하는" },
            { eng: "Conforming to", kor: "순응하는 (따르고 있지 않은지)" },
            { eng: "representation", kor: "표상 / 대변" },
            { eng: "is taking", kor: "바꾸다 / 차지하다" }
        ];

        let words = [...rawVocabulary];
        let currentIndex = 0;
        let isFlipped = false;
        let mode = "eng-kor"; // eng-kor 또는 kor-eng

        // DOM 요소
        const cardContainer = document.getElementById("cardContainer");
        const card = document.getElementById("card");
        const frontText = document.getElementById("frontText");
        const backText = document.getElementById("backText");
        const frontType = document.getElementById("frontType");
        const backType = document.getElementById("backType");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const progressText = document.getElementById("progressText");
        const progressBar = document.getElementById("progressBar");
        const modeSelect = document.getElementById("modeSelect");
        const shuffleBtn = document.getElementById("shuffleBtn");
        const resetBtn = document.getElementById("resetBtn");

        // 카드 업데이트 함수
        function updateCard() {
            if (words.length === 0) return;
            
            // 애니메이션 초기화 (뒤집힌 상태면 다시 원래대로)
            card.classList.remove("flipped");
            isFlipped = false;

            // 약간의 딜레이를 주어 텍스트가 바뀌는 타이밍 보정
            setTimeout(() => {
                const currentWord = words[currentIndex];
                if (mode === "eng-kor") {
                    frontType.textContent = "English";
                    frontText.textContent = currentWord.eng;
                    backType.textContent = "Korean (뜻)";
                    backText.textContent = currentWord.kor;
                } else {
                    frontType.textContent = "Korean (뜻)";
                    frontText.textContent = currentWord.kor;
                    backType.textContent = "English";
                    backText.textContent = currentWord.eng;
                }
            }, 150);

            // 네비게이션 및 프로그레스 바 업데이트
            progressText.textContent = `${currentIndex + 1} / ${words.length}`;
            const progressPercent = ((currentIndex + 1) / words.length) * 100;
            progressBar.style.width = `${progressPercent}%`;
        }

        // 카드 뒤집기
        function toggleFlip() {
            card.classList.toggle("flipped");
            isFlipped = !isFlipped;
        }

        // 다음 카드
        function nextCard() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                alert("마지막 카드입니다! 처음부터 다시 학습하려면 '처음부터' 버튼이나 셔플을 눌러보세요.");
            }
        }

        // 이전 카드
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // 셔플 알고리즘 (Fisher-Yates)
        function shuffleWords() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        // 이벤트 리스너 설정
        cardContainer.addEventListener("click", toggleFlip);
        nextBtn.addEventListener("click", nextCard);
        prevBtn.addEventListener("click", prevCard);
        
        modeSelect.addEventListener("change", (e) => {
            mode = e.target.value;
            updateCard();
        });

        shuffleBtn.addEventListener("click", () => {
            shuffleWords();
        });

        resetBtn.addEventListener("click", () => {
            words = [...rawVocabulary];
            currentIndex = 0;
            updateCard();
        });

        // 키보드 단축키 지원
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault(); // 스페이스바 스크롤 방지
                toggleFlip();
            } else if (e.code === "ArrowRight") {
                nextCard();
            } else if (e.code === "ArrowLeft") {
                prevCard();
            }
        });

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
